permalink: pretty

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate

remote_theme: phillipnicol/jekyll-theme-dhilan@main

url: phillipnicol.github.io
baseurl: /

title: Phillip Nicol

alert:
  - warning

paginate:         5
paginate_path:    '/blog/page:num'
                    # Or '/blog/page:num' if you want to move your index pages

disqus.shortname: phillipnicol

# Google Analytics
#google_analytics: G-TY0L5Q1HKQ


# Set the image for the Open Graph Protocol
defaults:
  - scope:
      path: ""
    values:
      image: /assets/thumbnails/dhilan_homepage_thumbnail.png